version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: bdg_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --save 60 1 --loglevel warning

  app:
    build: .
    container_name: bdg_monitor
    depends_on:
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    restart: always

volumes:
  redis_data:
